<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YallBot — AI Chatbot by YallCode</title>
  <link rel="icon" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c0f;
      --surface:  #111418;
      --border:   #1e2329;
      --border2:  #2a3040;
      --accent:   #00ff88;
      --accent2:  #00ccff;
      --muted:    #4a5568;
      --text:     #e2e8f0;
      --text-dim: #8899aa;
      --user-bg:  #0d1f14;
      --bot-bg:   #0d1520;
      --danger:   #ff4466;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 9999;
    }

    .app { display: grid; grid-template-rows: 56px 1fr 80px; height: 100vh; max-width: 900px; margin: 0 auto; }

    /* HEADER */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--accent); box-shadow: 0 0 8px rgba(0,255,136,0.3); }
    .logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .logo-text span { color: var(--accent); }
    .header-badge {
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      color: var(--accent); background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.2); padding: 2px 7px; border-radius: 20px;
    }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .status-text { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-dim); }
    .home-link {
      font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-dim);
      text-decoration: none; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 4px; transition: all 0.2s;
    }
    .home-link:hover { color: var(--accent); border-color: var(--accent); }

    /* CHAT */
    .chat-area {
      overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* WELCOME */
    .welcome { text-align: center; padding: 48px 20px; animation: fadeUp 0.5s ease both; }
    .welcome-icon { width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 14px; border: 1px solid rgba(0,255,136,0.3); box-shadow: 0 0 30px rgba(0,255,136,0.15); }
    .welcome h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
    .welcome h1 span { color: var(--accent); }
    .welcome p { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--text-dim); line-height: 1.6; max-width: 400px; margin: 0 auto 28px; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip {
      font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--text-dim);
      background: var(--surface); border: 1px solid var(--border2); padding: 7px 13px;
      border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .chip:hover { color: var(--accent2); border-color: var(--accent2); background: rgba(0,204,255,0.05); }

    /* MESSAGES */
    .msg { display: flex; gap: 10px; animation: fadeUp 0.25s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
      font-family: 'Space Mono', monospace;
    }
    .msg.user .avatar { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.25); color: var(--accent); }
    .msg.bot .avatar { background: rgba(0,204,255,0.1); border: 1px solid rgba(0,204,255,0.2); overflow: hidden; }
    .msg.bot .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .bubble { max-width: calc(100% - 52px); padding: 11px 15px; border-radius: 12px; font-size: 0.88rem; line-height: 1.65; word-wrap: break-word; }
    .msg.user .bubble { background: var(--user-bg); border: 1px solid rgba(0,255,136,0.15); border-top-right-radius: 3px; }
    .msg.bot  .bubble { background: var(--bot-bg);  border: 1px solid rgba(0,204,255,0.12); border-top-left-radius: 3px; }

    .bubble code { font-family: 'Space Mono', monospace; font-size: 0.78em; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; color: var(--accent2); }
    .bubble pre { background: #0a0e14; border: 1px solid var(--border2); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    .bubble pre code { background: none; padding: 0; font-size: 0.8em; color: var(--accent); }
    .bubble strong { font-weight: 700; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble p + p { margin-top: 8px; }

    /* TYPING */
    .typing { display: flex; align-items: center; gap: 4px; padding: 14px 15px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); background: var(--surface); padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
    .input-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 10px; padding: 0 14px; gap: 8px; transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(0,255,136,0.4); box-shadow: 0 0 12px rgba(0,255,136,0.07); }
    .input-prefix { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--accent); user-select: none; }
    #user-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 0.82rem; padding: 12px 0; resize: none; max-height: 120px; line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 8px; background: var(--accent);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; color: #0a0c0f;
    }
    .send-btn:hover { background: #00ffaa; box-shadow: 0 0 14px rgba(0,255,136,0.4); }
    .send-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; box-shadow: none; }
    .send-btn svg { width: 16px; height: 16px; }
    .clear-btn {
      width: 38px; height: 38px; border-radius: 8px; background: none;
      border: 1px solid var(--border2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; color: var(--muted);
    }
    .clear-btn:hover { color: var(--danger); border-color: var(--danger); }
    .clear-btn svg { width: 15px; height: 15px; }

    @media (max-width: 600px) { .app { max-width: 100%; } .welcome h1 { font-size: 1.4rem; } .bubble { font-size: 0.84rem; } }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-wrap">
      <img src="icon.png" class="logo-img" alt="YallBot" />
      <span class="logo-text">Yall<span>Bot</span></span>
      <span class="header-badge">v1.0</span>
    </div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">ready</span>
      </div>
      <a href="https://yallcode.github.io/YallCode/" class="home-link" target="_blank">← YallCode</a>
    </div>
  </header>

  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <img src="icon.png" class="welcome-icon" alt="YallBot" />
      <h1>Hey, I'm <span>YallBot</span></h1>
      <p>// An AI assistant built by YallCode.<br />Ask me anything — code, ideas, questions.</p>
      <div class="welcome-chips">
        <span class="chip" onclick="sendChip(this)">🛠️ Help me debug my code</span>
        <span class="chip" onclick="sendChip(this)">💡 Give me a project idea</span>
        <span class="chip" onclick="sendChip(this)">📖 Explain a concept</span>
        <span class="chip" onclick="sendChip(this)">🎮 Game dev tips</span>
        <span class="chip" onclick="sendChip(this)">🔥 What can you do?</span>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-wrap">
      <span class="input-prefix">&gt;</span>
      <textarea id="user-input" placeholder="Type a message..." rows="1" autocomplete="off"></textarea>
    </div>
    <button class="clear-btn" id="clear-btn" title="Clear chat">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
      </svg>
    </button>
    <button class="send-btn" id="send-btn" title="Send">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>

</div>
<script>
  let history = [];
  let isLoading = false;

  const SYSTEM_PROMPT = `You are YallBot — a sharp, helpful AI assistant made by YallCode (a developer who builds games and open-source tools).
You're concise, friendly, and developer-focused. You love coding, games, and building cool stuff.
Respond with clarity. Use markdown code blocks when showing code. Keep replies focused and punchy.
When asked about YallCode, mention their site: yallcode.github.io/YallCode/`;

  const chatArea   = document.getElementById('chat-area');
  const welcome    = document.getElementById('welcome');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);
  clearBtn.addEventListener('click', () => {
    history = [];
    chatArea.innerHTML = '';
    chatArea.appendChild(welcome);
    welcome.style.display = 'block';
  });

  function sendChip(el) {
    userInput.value = el.textContent.replace(/^[\S]+ /, '');
    sendMessage();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    welcome.style.display = 'none';
    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    userInput.value = '';
    userInput.style.height = 'auto';

    const typing = appendTyping();
    setStatus('thinking...', true);
    isLoading = true;
    sendBtn.disabled = true;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          system: SYSTEM_PROMPT,
          messages: history,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.content?.[0]?.text || '...';
      typing.remove();
      appendMsg('bot', reply);
      history.push({ role: 'assistant', content: reply });
      setStatus('ready');

    } catch (err) {
      typing.remove();
      appendMsg('bot', `⚠️ ${err.message}`);
      setStatus('error', false, true);
      setTimeout(() => setStatus('ready'), 3000);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  function appendMsg(role, content) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    if (role === 'bot') {
      const img = document.createElement('img');
      img.src = 'icon.png'; img.alt = 'YallBot';
      avatar.appendChild(img);
    } else {
      avatar.textContent = 'YOU';
    }
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = parseMarkdown(content);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function appendTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    const img = document.createElement('img');
    img.src = 'icon.png';
    avatar.appendChild(img);
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function setStatus(txt, thinking = false, err = false) {
    statusText.textContent = txt;
    const color = err ? 'var(--danger)' : thinking ? 'var(--accent2)' : 'var(--accent)';
    statusDot.style.background = color;
    statusDot.style.boxShadow = `0 0 6px ${color}`;
  }

  function parseMarkdown(text) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, code) => `<pre><code>${esc(code.trim())}</code></pre>`);
    text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    text = text.replace(/^### (.+)$/gm, '<strong style="font-size:1em;display:block;margin-top:8px;color:var(--accent2)">$1</strong>');
    text = text.replace(/^## (.+)$/gm, '<strong style="font-size:1.05em;display:block;margin-top:8px;color:var(--accent)">$1</strong>');
    text = text.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
    text = text.replace(/\n{2,}/g, '</p><p>');
    text = text.replace(/\n/g, '<br>');
    return `<p>${text}</p>`;
  }
</script>
</body>
</html>
